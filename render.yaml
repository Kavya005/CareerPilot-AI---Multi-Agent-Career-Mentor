services:
  - type: web
    name: careerpilot-app
    env: python
    plan: free
    rootDir: .
    buildCommand: "pip install uv && uv sync --frozen && npm install --prefix frontend && npm run build --prefix frontend"
    startCommand: "uv run uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./careerpilot.db
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
